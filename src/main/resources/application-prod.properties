# ===========================================
# CONFIGURACION DE LA APLICACION
# ===========================================
server.port=${SERVER_PORT}
spring.application.name=${SPRING_APPLICATION_NAME}
# ===========================================
# CONFIGURACION DE BASE DE DATOS MYSQL
# ===========================================
spring.datasource.jdbc-url=${SPRING_DATASOURCE_URL}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===========================================
# CONFIGURACION JPA/Hibernate
# ===========================================
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.properties.hibernate.platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
# ===========================================
# CONFIGURACION DE CODIFICACION
# ===========================================
server.servlet.encoding.charset=${SERVER_SERVLET_ENCODING_CHARSET}
server.servlet.encoding.enabled=${SERVER_SERVLET_ENCODING_ENABLED}
server.servlet.encoding.force=${SERVER_SERVLET_ENCODING_FORCE}
# ===========================================
# CONFIGURACION DE ERRORES Y SQL
# ===========================================
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE}
# ===========================================
# CONFIGURACION DE CORS
# ===========================================
application.security.cors.allowed.origins=${APPLICATION_SECURITY_CORS_ALLOWED_ORIGINS}
application.security.cors.allowed.methods=${APPLICATION_SECURITY_CORS_ALLOWED_METHODS}
application.security.cors.allowed.headers=${APPLICATION_SECURITY_CORS_ALLOWED_HEADERS}
application.security.cors.exposed.headers=${APPLICATION_SECURITY_CORS_EXPOSED_HEADERS}
application.security.cors.allowed.credentials=${APPLICATION_SECURITY_CORS_ALLOWED_CREDENTIALS}
application.security.cors.max.age=${APPLICATION_SECURITY_CORS_MAX_AGE}
# ===========================================
# CONFIGURACION DE JWT
# ===========================================
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration-token=${APPLICATION_SECURITY_JWT_EXPIRATION_TOKEN}
application.security.jwt.expiration-refresh-token=${APPLICATION_SECURITY_JWT_EXPIRATION_REFRESH_TOKEN}
application.security.jwt.expiration-password-reset=${APPLICATION_SECURITY_JWT_EXPIRATION_PASSWORD_RESET}
# ===========================================
# CONFIGURACION DE GOOGLE OAUTH2
# ===========================================
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE}
app.frontend.success-url=${APP_FRONTEND_SUCCESS_URL}
app.frontend.mail.url=${APP_FRONTEND_MAIL_URL}
# ===========================================
# CONFIGURACION DE AWS S3
# ===========================================
cloud.aws.credentials.access-key=${CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${CLOUD_AWS_CREDENTIALS_SECRET_KEY}
cloud.aws.region.static=${CLOUD_AWS_REGION_STATIC}
cloud.aws.s3.bucket=${CLOUD_AWS_S3_BUCKET}
# ===========================================
# CONFIGURACION DE MOODLE API
# ===========================================
moodle.api.url=${MOODLE_API_URL}
moodle.api.token=${MOODLE_API_TOKEN}
# ===========================================
# CONFIGURACION DE LOGGING
# ===========================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
# ===========================================
# CONFIGURACION DE CARGA DE ARCHIVOS
# ===========================================
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}
spring.destination.folder=${SPRING_DESTINATION_FOLDER}
# ===========================================
# CONFIGURACION DE CORREO ELECTRONICO
# ===========================================
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST}
# ===========================================
# CONFIGURACION DE ENDPOINTS DE ACTUATOR
# ===========================================
management.server.port=${MANAGEMENT_SERVER_PORT}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE}
management.endpoints.web.exposure.exclude=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_EXCLUDE}
management.endpoint.shutdown.access=${MANAGEMENT_ENDPOINT_SHUTDOWN_ACCESS}
# ===============================
# = CONFIGURACION ZIPKIN
# ===============================
management.tracing.enabled=true
management.tracing.sampling.probability=1
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT}
# ===========================================
# CONFIGURACION DE ORACLE
# ===========================================
oracle.datasource.jdbc-url=${ORACLE_DATASOURCE_URL}
oracle.datasource.url=${ORACLE_DATASOURCE_URL}
oracle.datasource.username=${ORACLE_DATASOURCE_USERNAME}
oracle.datasource.password=${ORACLE_DATASOURCE_PASSWORD}
oracle.datasource.driver-class-name=oracle.jdbc.OracleDriver
# ===========================================
# CONFIGURACION DE OPEN API
# ===========================================
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED}
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH}
springdoc.paths-to-match=${SPRINGDOC_PATHS_TO_MATCH}